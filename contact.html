<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="description" content="Contact Tisha Ahuja - get in touch for collaborations or opportunities.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Tisha Ahuja</title>
</head>

<body>
  <header>
    <nav aria-label="Main Navigation">
      <h1>Tisha Ahuja</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section aria-labelledby="contact-heading">
      <h2 id="contact-heading">Contact Me</h2>

      <p>You can contact me for internships, collaborations, or project opportunities.</p>

      <form action="#" method="post" aria-labelledby="contact-heading">
        
        <fieldset>
          <legend>Contact Form</legend>

          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required aria-required="true">

          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required aria-required="true">

          <label for="message">Message</label>
          <textarea id="message" name="message" required aria-required="true"></textarea>

          <button type="submit">Send Message</button>
        </fieldset>

      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Tisha Ahuja</p>
  </footer>

</html>
